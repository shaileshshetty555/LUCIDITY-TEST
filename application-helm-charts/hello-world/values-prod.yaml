replicaCount: 3

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 65

pdb:
  enabled: true
  minAvailable: 2

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

ingress:
  enabled: false

serviceMonitor:
  enabled: true
  additionalLabels:
    release: kube-prometheus-stack
